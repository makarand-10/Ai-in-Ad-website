<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneekssnooks - Premium Streetwear (Bundled)</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Router -->
    <script src="https://unpkg.com/history@5/umd/history.production.min.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.production.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.production.min.js"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">

    <style>
        /* --- GLOBAL STYLES (index.css) --- */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --accent: #E50914;
            --accent-hover: #ff1f1f;
            --border-color: #2a2a2a;
            --container-max-width: 1440px;
            --header-height: 80px;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
            --font-display: 'Oswald', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
        }

        .page-content {
            max-width: var(--container-max-width);
            margin: 0 auto;
            padding: 0 24px;
            padding-top: var(--header-height);
        }

        /* --- COMPONENT STYLES --- */

        /* Navbar.css */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: background-color 0.3s ease, padding 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .navbar.transparent {
            background-color: transparent;
            padding: 24px 0;
        }

        .navbar.scrolled {
            background-color: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-container {
            max-width: var(--container-max-width);
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-link {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--text-primary);
        }

        .cart-link {
            color: var(--text-primary);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            transition: background-color 0.3s ease;
        }

        .cart-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background-color: var(--accent);
            color: white;
            font-size: 10px;
            min-width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            border: 2px solid var(--bg-primary);
        }

        /* ProductCard.css */
        .product-card {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .card-image-container {
            width: 100%;
            position: relative;
            padding-top: 100%;
            background-color: #f0f0f0;
        }

        .card-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .card-image {
            transform: scale(1.05);
        }

        .card-details {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-price {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .size-selector {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .size-btn {
            min-width: 28px;
            height: 28px;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            background: transparent;
            color: var(--text-secondary);
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .size-btn.active {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
            font-weight: bold;
        }

        .add-to-cart-btn {
            margin-top: 4px;
            background-color: var(--accent);
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background-color 0.2s;
        }

        .add-to-cart-btn:hover {
            background-color: var(--accent-hover);
        }

        .add-to-cart-btn:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Home.css */
        .hero-section {
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1556906781-9a412961d289?ixlib=rb-4.0.3&auto=format&fit=crop&w=2400&q=80') no-repeat center center/cover;
            margin-bottom: 0;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.7) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-title {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -2px;
            color: var(--text-primary);
            line-height: 0.9;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .tagline {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 16px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero-cta {
            margin-top: 32px;
            padding: 16px 40px;
            background-color: var(--text-primary);
            color: var(--bg-primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .hero-cta:hover {
            transform: translateY(-2px);
            background-color: #f0f0f0;
        }

        .featured-section {
            padding-top: 80px;
            padding-bottom: 80px;
        }

        .section-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            transition: all 0.2s ease;
            background-color: transparent;
        }

        .filter-btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background-color: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
            font-weight: 600;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 24px;
        }

        .no-products {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
            width: 100%;
            grid-column: 1 / -1;
        }

        @media (min-width: 640px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .brand-title {
                font-size: 4rem;
            }
        }

        @media (min-width: 1024px) {
            .product-grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .brand-title {
                font-size: 8rem;
            }
        }

        /* Cart.css */
        .cart-page {
            padding: 24px;
            padding-bottom: 90px;
            min-height: 100vh;
            background-color: var(--bg-primary);
        }

        .cart-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .empty-cart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--text-secondary);
        }

        .shop-now-btn {
            margin-top: 16px;
            background-color: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: 600;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .cart-item {
            display: flex;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 12px;
            gap: 12px;
            position: relative;
        }

        .cart-item-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .cart-item-details h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .item-size {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .item-price {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            margin-top: 4px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
            background-color: var(--bg-primary);
            width: fit-content;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .quantity-controls button {
            color: var(--text-primary);
            display: flex;
            align-items: center;
        }

        .quantity-controls button:disabled {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .quantity-controls span {
            font-size: 14px;
            font-weight: 600;
        }

        .remove-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .remove-btn:hover {
            color: var(--accent);
            opacity: 1;
        }

        .cart-summary {
            background-color: var(--bg-secondary);
            padding: 24px;
            border-radius: 16px;
            position: sticky;
            bottom: 80px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .summary-row.total {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            color: var(--text-primary);
            font-weight: 700;
            font-size: 18px;
        }

        .checkout-btn {
            width: 100%;
            background-color: var(--text-primary);
            color: var(--bg-primary);
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* Profile.css */
        .profile-page {
            padding-bottom: 90px;
        }

        .profile-header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .profile-pic-container {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 16px;
            border: 3px solid var(--accent);
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info {
            text-align: center;
        }

        .user-info h2 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .user-info p {
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .edit-btn,
        .save-btn {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .edit-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 300px;
        }

        .edit-form input,
        .edit-form textarea {
            width: 100%;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 8px;
            color: var(--text-primary);
            border-radius: 8px;
        }

        .section {
            padding: 24px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .section h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            margin-bottom: 16px;
            font-size: 18px;
        }

        .saved-addresses textarea {
            width: 100%;
            min-height: 80px;
            resize: none;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 8px;
            color: white;
            border-radius: 8px;
        }

        .order-item {
            background-color: var(--bg-secondary);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-info {
            display: flex;
            flex-direction: column;
        }

        .order-id {
            color: var(--text-primary);
            font-weight: 600;
        }

        .order-date {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .order-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .order-status.completed {
            background-color: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .order-status.processing {
            background-color: rgba(255, 193, 7, 0.2);
            color: #FFC107;
        }

        .map-container {
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        .store-details {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }

        .store-details strong {
            color: var(--text-primary);
            display: block;
            margin-bottom: 4px;
        }

        /* Footer.css */
        .footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 64px 24px;
            margin-top: 80px;
        }

        .footer-content {
            max-width: var(--container-max-width);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        @media (min-width: 1024px) {
            .footer-content {
                flex-direction: row;
                justify-content: space-between;
            }

            .footer-left {
                max-width: 40%;
            }

            .footer-right {
                width: 50%;
            }
        }

        .footer-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .social-links {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .social-links a {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-map {
            width: 100%;
            height: 300px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Checkout.css */
        .checkout-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        @media (min-width: 1024px) {
            .checkout-container {
                flex-direction: row;
                gap: 64px;
            }

            .checkout-form-section {
                flex: 2;
            }

            .checkout-summary-section {
                flex: 1;
            }
        }

        .checkout-form-section h2,
        .checkout-summary-section h2 {
            font-size: 1.25rem;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-primary);
            width: 100%;
            outline: none;
        }

        .pay-btn {
            width: 100%;
            background-color: var(--accent);
            color: white;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }

        .pay-btn:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        /* ProductDetails.css */
        @media (min-width: 1024px) {
            .product-details-page {
                display: flex;
                height: 100vh;
                overflow: hidden;
            }

            .product-image-carousel {
                width: 60%;
                height: 100%;
                background-color: #f0f0f0;
                position: relative;
            }

            .details-container {
                width: 40%;
                height: 100%;
                overflow-y: auto;
                padding: 40px;
                background-color: var(--bg-primary);
                padding-top: 100px;
            }

            .back-btn {
                top: 32px;
                left: 32px;
                width: 48px;
                height: 48px;
                font-size: 20px;
                position: absolute;
                z-index: 10;
                background: rgba(0, 0, 0, 0.5);
                border-radius: 50%;
                color: white;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }

        @media (max-width: 1023px) {
            .product-details-page {
                padding-top: 80px;
            }

            .product-image-carousel {
                width: 100%;
                aspect-ratio: 1;
                position: relative;
            }

            .details-container {
                padding: 24px;
            }

            .back-btn {
                position: absolute;
                top: 100px;
                left: 20px;
                z-index: 10;
                background: rgba(0, 0, 0, 0.5);
                color: white;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-name {
            font-size: 2.5rem;
            font-family: var(--font-display);
            text-transform: uppercase;
            line-height: 1;
            width: 100%;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.5rem;
            color: var(--text-primary);
            font-weight: 300;
            display: block;
            margin-bottom: 20px;
        }

        .size-tile {
            width: 40px;
            height: 40px;
            border: 1px solid #333;
            margin-right: 8px;
            border-radius: 4px;
            color: #ccc;
        }

        .size-tile.selected {
            background: white;
            color: black;
            border-color: white;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- SAFE GLOBAL IMPORTS ---
        const { useState, useEffect, createContext, useContext, useMemo } = React;
        const { HashRouter, Routes, Route, NavLink, Link, useLocation, useNavigate, useParams, Outlet } = ReactRouterDOM;
        const { motion, AnimatePresence } = window.Motion || { motion: { div: ({ children, ...props }) => <div {...props}>{children}</div>, h1: 'h1', p: 'p', button: 'button', img: 'img' }, AnimatePresence: ({ children }) => <>{children}</> };

        // --- DATA ---
        const products = [
            { id: 1, name: "Air Jordan 1 High OG", price: 16995, image: "https://images.unsplash.com/photo-1552346154-21d32810aba3?auto=format&fit=crop&w=1000&q=80", category: "High Tops", description: "The classic that started it all.", sizes: [7, 8, 9, 10, 11] },
            { id: 2, name: "Yeezy Boost 350 V2", price: 22999, image: "https://images.unsplash.com/photo-1515955656352-a1fa3ffcd111?auto=format&fit=crop&w=1000&q=80", category: "Runners", description: "Unmatched comfort.", sizes: [6, 7, 8, 9, 10, 11] },
            { id: 3, name: "Nike Dunk Low Retro", price: 9695, image: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?auto=format&fit=crop&w=1000&q=80", category: "Low Tops", description: "Classic court style.", sizes: [7, 8, 9, 10, 11, 12] },
            { id: 4, name: "New Balance 550", price: 10999, image: "https://images.unsplash.com/photo-1551107696-a4b0c5a0d9a2?auto=format&fit=crop&w=1000&q=80", category: "Retro Court", description: "Simple & Clean.", sizes: [8, 9, 10, 11] },
            { id: 5, name: "Air Max 90", price: 11495, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1000&q=80", category: "Running", description: "Clean lines, versatile.", sizes: [7, 8, 9, 10, 11] },
            { id: 6, name: "Jordan 4 Retro", price: 19495, image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?auto=format&fit=crop&w=1000&q=80", category: "High Tops", description: "Coveted silhouette.", sizes: [8, 9, 10, 11] },
            { id: 7, name: "Adidas Originals Forum", price: 8999, image: "https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?auto=format&fit=crop&w=1000&q=80", category: "Low Tops", description: "Basketball DNA.", sizes: [7, 8, 9, 10] },
            { id: 8, name: "Converse Chuck 70", price: 6499, image: "https://images.unsplash.com/photo-1603808033192-082d6919d3e1?auto=format&fit=crop&w=1000&q=80", category: "Canvas", description: "Vintage details.", sizes: [5, 6, 7, 8, 9, 10, 11] }
        ];

        // --- CONTEXT ---
        const CartContext = createContext();
        const useCart = () => useContext(CartContext);
        const CartProvider = ({ children }) => {
            const [cart, setCart] = useState(() => {
                const saved = localStorage.getItem('sneekssnooks_cart_v2');
                return saved ? JSON.parse(saved) : [];
            });
            useEffect(() => localStorage.setItem('sneekssnooks_cart_v2', JSON.stringify(cart)), [cart]);

            const addToCart = (product, size) => {
                setCart(prev => {
                    const exists = prev.find(item => item.id === product.id && item.size === size);
                    if (exists) return prev.map(item => item.id === product.id && item.size === size ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prev, { ...product, size, quantity: 1 }];
                });
            };
            const removeFromCart = (id, size) => setCart(prev => prev.filter(item => !(item.id === id && item.size === size)));
            const updateQuantity = (id, size, delta) => setCart(prev => prev.map(item => (item.id === id && item.size === size) ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item));
            const clearCart = () => setCart([]);
            const cartCount = cart.reduce((acc, item) => acc + item.quantity, 0);
            const cartTotal = cart.reduce((acc, item) => acc + item.price * item.quantity, 0);

            return <CartContext.Provider value={{ cart, addToCart, removeFromCart, updateQuantity, clearCart, cartCount, cartTotal }}>{children}</CartContext.Provider>;
        };

        // --- SCOLL TO TOP ---
        const ScrollToTop = () => {
            const { pathname } = useLocation();
            useEffect(() => window.scrollTo(0, 0), [pathname]);
            return null;
        };

        // --- COMPONENTS ---
        const Navbar = () => {
            const { cartCount } = useCart();
            const [scrolled, setScrolled] = useState(false);
            const location = useLocation();
            const isHome = location.pathname === '/';

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <header className={`navbar ${scrolled || !isHome ? 'scrolled' : 'transparent'}`}>
                    <div className="navbar-container">
                        <NavLink to="/" className="logo">SNEEKSSNOOKS</NavLink>
                        <nav className="nav-links">
                            <NavLink to="/" className="nav-link">Home</NavLink>
                            <NavLink to="/profile" className="nav-link"><i className="fa-solid fa-user"></i> Profile</NavLink>
                            <NavLink to="/cart" className="cart-link">
                                <div className="icon-wrapper" style={{ display: 'flex', alignItems: 'center' }}>
                                    <i className="fa-solid fa-bag-shopping" style={{ fontSize: '20px' }}></i>
                                    {cartCount > 0 && <span className="badge">{cartCount}</span>}
                                </div>
                            </NavLink>
                        </nav>
                    </div>
                </header>
            );
        };

        const Footer = () => (
            <footer className="footer">
                <div className="footer-content">
                    <div className="footer-left">
                        <h2 className="footer-logo">SNEEKSSNOOKS</h2>
                        <div className="social-links">
                            <a href="#"><i className="fa-brands fa-instagram"></i></a>
                            <a href="#"><i className="fa-brands fa-twitter"></i></a>
                            <a href="#"><i className="fa-brands fa-facebook-f"></i></a>
                        </div>
                        <div className="footer-info">
                            <p style={{ marginBottom: 8 }}><i className="fa-solid fa-map-marker-alt"></i> 123 Linking Road, Bandra West</p>
                            <p><i className="fa-solid fa-phone"></i> +91 98765 43210</p>
                        </div>
                        <p style={{ marginTop: 24, color: '#555' }}>&copy; 2026 Sneekssnooks</p>
                    </div>
                    <div className="footer-right">
                        <h3 style={{ marginBottom: 16, fontFamily: 'Oswald' }}>Visit Our Mumbai Flagship</h3>
                        <div className="footer-map">
                            <iframe title="Store Location" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d120638.06452279165!2d72.83363675685827!3d19.07609070868856!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7c6306644edc1%3A0x5da4ed8f8d648c69!2sMumbai%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1683888888888!5m2!1sen!2sin" width="100%" height="100%" style={{ border: 0 }} loading="lazy"></iframe>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const ProductCard = ({ product }) => {
            const { addToCart } = useCart();
            const [selectedSize, setSelectedSize] = useState(null);
            const navigate = useNavigate();

            const handleAddToCart = (e) => {
                e.stopPropagation();
                if (selectedSize) addToCart(product, selectedSize);
                else alert("Select a size!");
            };

            return (
                <motion.div className="product-card" onClick={() => navigate(`/product/${product.id}`)} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}>
                    <div className="card-image-container">
                        <img src={product.image} alt={product.name} className="card-image" onError={(e) => { e.target.onerror = null; e.target.src = 'https://images.unsplash.com/photo-1552346154-21d32810aba3?auto=format&fit=crop&w=1000&q=80' }} />
                    </div>
                    <div className="card-details">
                        <h3 className="card-title">{product.name}</h3>
                        <p className="card-price">₹{product.price.toLocaleString()}</p>
                        <div className="size-selector" onClick={e => e.stopPropagation()}>
                            {product.sizes.map(size => (
                                <button key={size} className={`size-btn ${selectedSize === size ? 'active' : ''}`} onClick={() => setSelectedSize(size)}>{size}</button>
                            ))}
                        </div>
                        <button className="add-to-cart-btn" onClick={handleAddToCart} disabled={!selectedSize}>
                            <i className="fa-solid fa-plus" style={{ marginRight: 4 }}></i> {selectedSize ? 'Add' : 'Select Size'}
                        </button>
                    </div>
                </motion.div>
            );
        };

        // --- PAGES ---
        const Home = () => {
            const [activeCategory, setActiveCategory] = useState("All");
            const filtered = useMemo(() => activeCategory === "All" ? products : products.filter(p => activeCategory === "Runners" && p.category === "Running" ? true : p.category === activeCategory), [activeCategory]);

            return (
                <div className="home-page">
                    <section className="hero-section">
                        <div className="hero-overlay"></div>
                        <div className="hero-content">
                            <motion.h1 className="brand-title" initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }}>SNEEKSSNOOKS</motion.h1>
                            <p className="tagline">Where Street Meets Sole.</p>
                            <button className="hero-cta" onClick={() => document.getElementById('shop').scrollIntoView({ behavior: 'smooth' })}>Shop Full Collection</button>
                        </div>
                    </section>
                    <section className="page-content" id="shop">
                        <div className="section-header">
                            <h2 className="section-title">New Drops</h2>
                            <span className="section-subtitle">Freshest kicks in town</span>
                        </div>
                        <div className="filter-bar">
                            {["All", "High Tops", "Low Tops", "Runners", "Retro Court"].map(cat => (
                                <button key={cat} className={`filter-btn ${activeCategory === cat ? 'active' : ''}`} onClick={() => setActiveCategory(cat)}>{cat}</button>
                            ))}
                        </div>
                        <div className="product-grid">
                            {filtered.length > 0 ? filtered.map(p => <ProductCard key={p.id} product={p} />) : <p className="no-products">No products found.</p>}
                        </div>
                    </section>
                </div>
            );
        };

        const ProductDetails = () => {
            const { id } = useParams();
            const { addToCart } = useCart();
            const navigate = useNavigate();
            const product = products.find(p => p.id === parseInt(id));
            const [selectedSize, setSelectedSize] = useState(null);

            if (!product) return <div style={{ paddingTop: 100, textAlign: 'center' }}>Loading...</div>;

            return (
                <motion.div className="product-details-page" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                    <button className="back-btn" onClick={() => navigate(-1)}><i className="fa-solid fa-arrow-left"></i></button>
                    <motion.div className="product-image-carousel" initial={{ x: -20, opacity: 0 }} animate={{ x: 0, opacity: 1 }}>
                        <img src={product.image} className="main-image" onError={e => { e.target.onerror = null; e.target.src = 'https://images.unsplash.com/photo-1552346154-21d32810aba3?auto=format&fit=crop&w=1000&q=80' }} />
                    </motion.div>
                    <div className="details-container">
                        <h1 className="product-name">{product.name}</h1>
                        <span className="product-price">₹{product.price.toLocaleString()}</span>
                        <p style={{ marginBottom: 16, color: 'var(--accent)' }}>{product.category}</p>
                        <p className="product-description">{product.description}</p>
                        <h3 style={{ marginBottom: 8 }}>Select Size (US)</h3>
                        <div className="size-selector" style={{ marginBottom: 20 }}>
                            {product.sizes.map(size => (
                                <button key={size} className={`size-tile ${selectedSize === size ? 'selected' : ''}`} onClick={() => setSelectedSize(size)}>{size}</button>
                            ))}
                        </div>
                        <button className="add-to-cart-cta" onClick={() => selectedSize ? addToCart(product, selectedSize) : alert('Select Size')} disabled={!selectedSize}>
                            Add to Cart <i className="fa-solid fa-cart-shopping"></i>
                        </button>
                    </div>
                </motion.div>
            );
        };

        const Cart = () => {
            const { cart, removeFromCart, updateQuantity, cartTotal } = useCart();
            const navigate = useNavigate();
            return (
                <motion.div className="page-content" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                    <h1 className="cart-title">Your Cart</h1>
                    {cart.length === 0 ?
                        <div className="empty-cart"><p>Your bag is empty.</p><button onClick={() => navigate('/')} className="shop-now-btn">Shop Now</button></div>
                        : (
                            <>
                                <div className="cart-items">
                                    {cart.map(item => (
                                        <div key={`${item.id}-${item.size}`} className="cart-item">
                                            <div className="cart-item-image"><img src={item.image} onError={e => { e.target.onerror = null; e.target.src = 'https://images.unsplash.com/photo-1552346154-21d32810aba3?auto=format&fit=crop&w=1000&q=80' }} /></div>
                                            <div className="cart-item-details">
                                                <h3>{item.name}</h3>
                                                <p className="item-size">Size: {item.size}</p>
                                                <p className="item-price">₹{item.price.toLocaleString()}</p>
                                                <div className="quantity-controls">
                                                    <button onClick={() => updateQuantity(item.id, item.size, -1)} disabled={item.quantity <= 1}><i className="fa-solid fa-minus" style={{ fontSize: 10 }}></i></button>
                                                    <span>{item.quantity}</span>
                                                    <button onClick={() => updateQuantity(item.id, item.size, 1)}><i className="fa-solid fa-plus" style={{ fontSize: 10 }}></i></button>
                                                </div>
                                            </div>
                                            <button className="remove-btn" onClick={() => removeFromCart(item.id, item.size)}><i className="fa-solid fa-trash"></i></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="cart-summary">
                                    <div className="summary-row"><span>Subtotal</span><span>₹{cartTotal.toLocaleString()}</span></div>
                                    <div className="summary-row"><span>Shipping</span><span>Free</span></div>
                                    <div className="summary-row total"><span>Total</span><span>₹{cartTotal.toLocaleString()}</span></div>
                                    <button className="checkout-btn" onClick={() => navigate('/checkout')}>Checkout <i className="fa-solid fa-arrow-right"></i></button>
                                </div>
                            </>
                        )}
                </motion.div>
            );
        };

        const Checkout = () => {
            const { cart, cartTotal, clearCart } = useCart();
            const navigate = useNavigate();
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => { clearCart(); setLoading(false); navigate('/order-success'); }, 2000);
            };

            if (cart.length === 0) return <div className="page-content">Cart Empty</div>;

            return (
                <motion.div className="page-content" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                    <h1 className="cart-title">Checkout</h1>
                    <div className="checkout-container">
                        <div className="checkout-form-section">
                            <h2 style={{ borderBottom: '1px solid #333', paddingBottom: 12, marginBottom: 24 }}>Shipping Details</h2>
                            <form onSubmit={handleSubmit} id="checkout-form">
                                <div className="form-group"><input placeholder="Full Name" required /></div>
                                <div className="form-group"><input placeholder="Address" required /></div>
                                <div className="form-group"><input placeholder="Card Number (Mock)" required /></div>
                            </form>
                        </div>
                        <div className="checkout-summary-section" style={{ background: 'var(--bg-secondary)', padding: 24, borderRadius: 16, height: 'fit-content' }}>
                            <h2>Order Summary</h2>
                            {cart.map(item => (
                                <div key={item.id + item.size} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12, fontSize: 14 }}>
                                    <span>{item.name} x {item.quantity}</span>
                                    <span>₹{(item.price * item.quantity).toLocaleString()}</span>
                                </div>
                            ))}
                            <div className="summary-row total"><span>Total</span><span>₹{cartTotal.toLocaleString()}</span></div>
                            <button type="submit" form="checkout-form" className="pay-btn" disabled={loading}>{loading ? 'Processing...' : `Pay ₹${cartTotal.toLocaleString()}`}</button>
                        </div>
                    </div>
                </motion.div>
            );
        };

        const OrderSuccess = () => {
            const navigate = useNavigate();
            return (
                <div className="order-success-page" style={{ height: '70vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                    <i className="fa-solid fa-check-circle" style={{ fontSize: 80, color: '#4CAF50', marginBottom: 24 }}></i>
                    <h1 style={{ fontFamily: 'Oswald', textTransform: 'uppercase' }}>Order Placed!</h1>
                    <p style={{ marginBottom: 24, color: '#888' }}>Order #SNK-{Math.floor(Math.random() * 9000) + 1000}</p>
                    <button className="hero-cta" onClick={() => navigate('/')}>Continue Shopping</button>
                </div>
            );
        };

        const Profile = () => {
            const [user, setUser] = useState({ name: "Sneaker Fan", email: "fan@sneekssnooks.com", address: "Mumbai" });
            const [isEditing, setIsEditing] = useState(false);
            return (
                <motion.div className="page-content" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                    <div className="profile-header">
                        <div className="profile-pic-container"><img src="https://images.unsplash.com/photo-1633332755192-727a05c4013d" className="profile-pic" /></div>
                        <div className="user-info">
                            {isEditing ? <input value={user.name} onChange={e => setUser({ ...user, name: e.target.value })} style={{ marginBottom: 8, textAlign: 'center' }} /> : <h2>{user.name}</h2>}
                            <p>{user.email}</p>
                            <button onClick={() => setIsEditing(!isEditing)} className="edit-btn" style={{ margin: '0 auto' }}><i className="fa-solid fa-user-edit"></i> {isEditing ? 'Save' : 'Edit Profile'}</button>
                        </div>
                    </div>
                    <div className="section saved-addresses">
                        <h3><i className="fa-solid fa-map-marker-alt"></i> Saved Address</h3>
                        {isEditing ? <textarea value={user.address} onChange={e => setUser({ ...user, address: e.target.value })} /> : <p>{user.address}</p>}
                    </div>
                </motion.div>
            );
        };

        const App = () => {
            return (
                <HashRouter>
                    <CartProvider>
                        <div className="container">
                            <Navbar />
                            <ScrollToTop />
                            <div className="main-content">
                                <AnimatePresence mode="wait">
                                    <Routes>
                                        <Route path="/" element={<Home />} />
                                        <Route path="/product/:id" element={<ProductDetails />} />
                                        <Route path="/cart" element={<Cart />} />
                                        <Route path="/checkout" element={<Checkout />} />
                                        <Route path="/order-success" element={<OrderSuccess />} />
                                        <Route path="/profile" element={<Profile />} />
                                    </Routes>
                                </AnimatePresence>
                            </div>
                            <Footer />
                        </div>
                    </CartProvider>
                </HashRouter>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
